- name: Check if kubeadm has already initialized this node
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_init_check
  when: inventory_hostname in groups['masters']

- name: Run kubeadm init on the control-plane node
  command: >
    kubeadm init
    --apiserver-advertise-address={{ ansible_host }}
    --control-plane-endpoint={{ ansible_host }}
    --pod-network-cidr=10.244.0.0/16
    --upload-certs   
  when:
    - inventory_hostname in groups['masters']
    - not kubeadm_init_check.stat.exists
  register: kubeadm_init_output

- name: Save kubeadm init output for reference/debugging
  copy:
    content: "{{ kubeadm_init_output.stdout }}"
    dest: /root/kubeadm-init-output.log
    mode: '0600'
  when:
    - inventory_hostname in groups['masters']
    - kubeadm_init_output is changed

- name: Create .kube directory for root on control-plane
  file:
    path: /root/.kube
    state: directory
    mode: '0700'
  when: inventory_hostname in groups['masters']

- name: Copy admin.conf to root's kube config on control-plane
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    mode: '0600'
  when: inventory_hostname in groups['masters']

- name: Fetch admin.conf from control-plane to the Ansible control node
  fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ playbook_dir }}/../fetched/admin.conf"
    flat: true
  when: inventory_hostname in groups['masters']

- name: Generate the kubeadm join command on the control-plane
  command: kubeadm token create --print-join-command
  register: kubeadm_join_command_raw
  when: inventory_hostname in groups['masters']
  changed_when: false

- name: Store join command as a fact so worker nodes can access it via hostvars
  set_fact:
    kubeadm_join_command: "{{ kubeadm_join_command_raw.stdout }}"
  when: inventory_hostname in groups['masters']

# --------------------------------------------------------------------------
# --------------------------------------------------------------------------

- name: Check if this worker has already joined the cluster
  stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_join_check
  when: inventory_hostname in groups['workers']

- name: Join worker node to the cluster
  command: "{{ hostvars[groups['masters'][0]].kubeadm_join_command }}"
  when:
    - inventory_hostname in groups['workers']
    - not kubelet_join_check.stat.exists
  register: kubeadm_join_output

- name: Save kubeadm join output for reference/debugging
  copy:
    content: "{{ kubeadm_join_output.stdout }}"
    dest: /root/kubeadm-join-output.log
    mode: '0600'
  when:
    - inventory_hostname in groups['workers']
    - kubeadm_join_output is changed
