apiVersion: batch/v1
kind: Job
metadata:
  name: pre-deploy-check
  namespace: production-apps
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      containers:
      - name: check
        image: busybox
        command: ["sh", "-c", "exit 1"]
      restartPolicy: Never
